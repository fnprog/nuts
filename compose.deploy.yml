services:
  migrations:
    image: "nuts/migrator"
    container_name: "nuts_migrations"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_SSL_MODE: ${DB_SSL_MODE:-require}
    build:
      context: ./server/database/migrations
      dockerfile: Dockerfile
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
    networks:
      - nuts_network

  server:
    image: "nuts/server"
    container_name: "nuts_server"
    build:
      context: .
      dockerfile: ./server/Dockerfile
      args:
        API_PORT: ${API_PORT:-8080}
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8080}
      API_REQUEST_LOG: ${API_REQUEST_LOG:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DB_HOST: ${DB_HOST}
      DB_DRIVER: pgx
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_SSL_MODE: ${DB_SSL_MODE:-require}
      DB_MAX_CONNECTION_POOL: ${DB_MAX_CONNECTION_POOL:-10}
      DB_MAX_IDLE_CONNECTIONS: ${DB_MAX_IDLE_CONNECTIONS:-5}
      DB_CONNECTIONS_MAX_LIFETIME: ${DB_CONNECTIONS_MAX_LIFETIME:-300s}
      AUTH_SIGNINGKEY: ${AUTH_SIGNINGKEY}
      AUTH_REFRESHKEY: ${AUTH_REFRESHKEY}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASS: ${REDIS_PASS}
      STORAGE_HOST: ${STORAGE_HOST:-Minio}
      STORAGE_PUBLIC_BUCKET_NAME: ${STORAGE_PUBLIC_BUCKET_NAME:-nuts_public}
      STORAGE_PRIVATE_BUCKET_NAME: ${STORAGE_PRIVATE_BUCKET_NAME:-nuts_private}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_MINIO_ENDPOINT: ${STORAGE_MINIO_ENDPOINT}
      STORAGE_MINIO_SSL: ${STORAGE_MINIO_SSL:-true}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
    depends_on:
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/bin/local/healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    networks:
      - nuts_network

  client:
    image: "nuts/client"
    container_name: "nuts_client"
    build:
      context: ./apps/client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL}
        NODE_ENV: production
    ports:
      - "${CLIENT_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=50M
      - /var/cache/nginx:size=50M
      - /var/run:size=50M
    networks:
      - nuts_network

networks:
  nuts_network:
    driver: bridge
